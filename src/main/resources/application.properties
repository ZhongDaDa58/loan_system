spring.application.name=loan

# 激活的配置文件（默认 dev，生产环境通过环境变量覆盖）
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=8080
server.servlet.context-path=/


spring.datasource.url=jdbc:mysql://localhost:3306/loan_risk_control?allowMultiQueries=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:114514}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.loan.entity
mybatis.configuration.map-underscore-to-camel-case=true


springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.packages-to-scan=com.loan.controller


jwt.secret=${JWT_SECRET:loan_system_springboot40_secret_2024}
jwt.expiration=7200000


logging.level.com.loan=info
logging.level.org.springframework.web=warn
